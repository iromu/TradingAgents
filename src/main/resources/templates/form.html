<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en"
      th:replace="~{common/layout :: layout(~{::title}, ~{::section}, ~{::extraHeadContent})}">
<head>
    <title>Embabel Trading Agent</title>
    <th:block th:fragment="extraHeadContent">
        <meta name="htmx-config" content='{"followRedirects": true}'>
        <script src="https://unpkg.com/htmx.org@2.0.5"></script>
    </th:block>
</head>
<section>
    <h2>Embabel Trading Agent</h2>
    <form th:action="@{/plan}" method="post" th:object="${ticker}" hx-boost="true">
        <div class="form-group">
            <label for="content">Ticker</label>
            <textarea id="content" name="content" rows="3" cols="40" th:field="*{content}" required></textarea>
        </div>
        <button class="submit-btn" type="submit" style="margin-top: 20px;">Execute Agent Plan</button>
    </form>
</section>
</html>
