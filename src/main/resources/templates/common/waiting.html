<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en"
      th:replace="~{common/layout :: layout(~{::title}, ~{::section}, ~{::extraHeadContent})}">
<head>
    <title th:text="${pageTitle} ?: 'Waiting'">Waiting</title>
    <th:block th:fragment="extraHeadContent">
        <link rel="stylesheet" th:href="@{/css/project.css}" />
    </th:block>
</head>
<section>
    <div class="waiting-container">
        <div class="waiting-header">
            <h2>Review Required</h2>
            <p>The investment debate is complete. Please review the debate and provide your feedback before the final plan is generated.</p>
        </div>

        <!-- Debate preview -->
        <div class="waiting-form">
            <h3>Investment Debate</h3>
            <div class="debate-preview">
                <h4>Debate History</h4>
                <div th:each="turn : ${debateHistory}">
                    <div class="debate-entry">
                        <div class="debate-turn" th:classappend="${turn.bull} ? 'bull' : 'bear'" th:text="${turn.bull} ? 'Bull' : 'Bear'">Turn</div>
                        <div class="debate-text" th:text="${turn.text}">Content</div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(debateHistory)}" class="debate-entry">
                    <div class="debate-text" style="color: #888; font-style: italic;">No debate history available.</div>
                </div>
            </div>
        </div>

        <!-- HITL Form -->
        <form th:action="@{/status/{processId}/waitfor(processId=${processId})}" method="post" class="waiting-form approval-form">
            <h3>Your Feedback</h3>

            <div class="form-group">
                <label for="feedback">Feedback / Instructions (optional)</label>
                <textarea id="feedback" name="feedback" maxlength="1000" placeholder="Provide feedback, corrections, or additional instructions for the investment plan..."></textarea>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="approved" name="approved" value="true" checked />
                    <label for="approved">Approve and proceed with generating the final investment plan</label>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/}" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-submit">Submit Feedback</button>
            </div>
        </form>

        <div class="sse-status">
            <p>Waiting for your input. Submit the form to continue.</p>
        </div>
    </div>
</section>
</html>
