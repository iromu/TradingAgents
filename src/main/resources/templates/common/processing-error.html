<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en"
      th:replace="~{common/layout :: layout(~{::title}, ~{::section}, ~{})}">
<head>
    <title>Processing error</title>
</head>
<section>
    <h2 th:text="${pageTitle} ?: 'Processing Error'">Processing Error</h2>
    <p th:text="${error}">An error occurred while processing.</p>
    <p>Please try again later or contact support if the issue persists.</p>
    <a th:href="@{/}" rel="noopener noreferrer">Return home</a>
</section>
</html>
