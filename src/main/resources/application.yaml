spring:
  application:
    name: Gekko

embabel:
  models:
    default-llm: ${OPENAI_MODEL:Qwen3.6-35B-A3B}
    llms:
      cheapest: ${OPENAI_MODEL:Qwen3.6-35B-A3B}
      best: ${OPENAI_MODEL:Qwen3.6-35B-A3B}
  agent:
    platform:
      models:
        openai:
          custom:
            api-key: ${OPENAI_API_KEY:litellm_apikey}
            base-url: ${OPENAI_BASE_URL:http://spark.local:4000}
            models: ${OPENAI_MODEL:Qwen3.6-35B-A3B}
      scanning:
        annotation: true
        bean: true

app:
  memory:
    log-path: ~/.tradingagents/memory/trading_memory.md
    log-max-entries: 0
  checkpoint:
    enabled: false
    dir: data/checkpoints
  fred:
    api-key: ${FRED_API_KEY:}
    enabled: true
  polymarket:
    enabled: true
  llm-options:
    provider: openai-compat
    best-model: ${OPENAI_MODEL:Qwen3.6-35B-A3B}
    cheapest-model: ${OPENAI_MODEL:Qwen3.6-35B-A3B}
    anthropic:
      effort: high
    google:
      thinking-level: high
    openai:
      reasoning-effort: high

spring.profiles.active: base,app,local
logging:
  level:
    com.embabel: WARN
    com.embabel.agent.api.annotation.support.AgentMetadataReader: WARN
