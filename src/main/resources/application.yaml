spring:
  application:
    name: Gekko

embabel:
  models:
    default-llm: ${OPENAI_MODEL:Qwen3.6-35B-A3B}
    llms:
      cheapest: ${OPENAI_MODEL:Qwen3.6-35B-A3B}
      best: ${OPENAI_MODEL:Qwen3.6-35B-A3B}
  agent:
    platform:
      models:
        openai:
          custom:
            api-key: ${OPENAI_API_KEY:dummy}
            base-url: ${OPENAI_BASE_URL:http://spark.local:4000}
            models: ${OPENAI_MODEL:Qwen3.6-35B-A3B}
      scanning:
        bean: false

spring.profiles.active: base,app,observability,local
logging:
  level:
    com.embabel: WARN
    com.embabel.agent.api.annotation.support.AgentMetadataReader: WARN
