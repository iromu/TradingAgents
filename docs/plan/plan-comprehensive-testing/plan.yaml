plan_id: "plan-comprehensive-testing"
objective: "Create comprehensive unit tests (FakePromptRunner) and integration tests (EmbabelMockitoIntegrationTest) for ALL agent actions that call LLMs in the TradingAgents project. Cover 16 LLM-calling actions across TraderAgent, BullResearcher, BearResearcher, and RiskDebateService."
created_at: "2026-06-13T00:00:00Z"
created_by: "planner"
status: "pending"
research_confidence: "high"
plan_metrics:
  wave_1_task_count: 5
  total_dependencies: 0
  risk_score: "low"
tldr: "13 new test files (8 unit + 5 integration) covering all 16 LLM-calling actions. Wave 1: complex unit tests with mocking. Wave 2: simple unit tests + existing test cleanup. Wave 3: integration tests. All tests use FakePromptRunner (unit) or EmbabelMockitoIntegrationTest (integration)."
pre_mortem:
  overall_risk_level: "low"
  critical_failure_modes:
    - scenario: "FakePromptRunner API changes in embabel-agent-test snapshot"
      likelihood: "medium"
      impact: "high"
      mitigation: "Pin test dependency version; verify API surface before implementation"
    - scenario: "Integration tests require Spring context that fails to start"
      likelihood: "medium"
      impact: "high"
      mitigation: "Start with simplest integration test; verify Spring Boot test autoconfig"
    - scenario: "ToolObject mocking (FundamentalDataTools, etc.) is complex"
      likelihood: "high"
      impact: "medium"
      mitigation: "Use FakePromptRunner for tool-calling actions; mock tools in integration tests"
  assumptions:
    - "FakePromptRunner.create() provides context.expectResponse() and context.promptRunner()"
    - "EmbabelMockitoIntegrationTest provides whenCreateObject/verifyCreateObjectMatching"
    - "Existing test patterns (TraderAgentCoreTest, etc.) can coexist with new tests"
    - "All existing tests pass before adding new ones"
gaps:
  - description: "The exact API surface of embabel-agent-test 0.5.0-SNAPSHOT is not fully verified. The skill docs describe patterns but the actual classes/methods may differ."
    refinement_requests:
      - query: "FakePromptRunner getLlmInvocations expectResponse"
        source_hint: "embabel-agent-test Javadoc or source"
      - query: "EmbabelMockitoIntegrationTest whenCreateObject verifyCreateObjectMatching"
        source_hint: "embabel-agent-test Javadoc or source"
implementation_specification:
  code_structure: "New test files go in src/test/java/com/embabel/gekko/agent/ (unit tests) and src/test/java/com/embabel/gekko/agent/integration/ (integration tests). Existing tests in src/test/java/com/embabel/gekko/agent/researchers/ are preserved and enhanced."
  affected_areas:
    - "src/test/java/com/embabel/gekko/agent/"
    - "src/test/java/com/embabel/gekko/agent/integration/ (new directory)"
    - "src/test/java/com/embabel/gekko/agent/researchers/"
  component_details:
    - component: "TraderAgent unit tests"
      responsibility: "Test LLM-calling actions with FakePromptRunner"
      interfaces:
        - "FakeOperationContext"
        - "FakePromptRunner"
      dependencies:

    - component: "Researcher unit tests"
      responsibility: "Test BullResearcher.argue() and BearResearcher.argue()"
      interfaces:
        - "ActionContext"
        - "FakePromptRunner"
      dependencies:

    - component: "RiskDebateService unit tests"
      responsibility: "Test risk debate with mocked LLM calls"
      interfaces:
        - "ActionContext"
        - "FakePromptRunner"
      dependencies:

    - component: "Integration tests"
      responsibility: "Full workflow tests under Spring Boot context"
      interfaces:
        - "EmbabelMockitoIntegrationTest"
        - "whenCreateObject"
        - "verifyCreateObjectMatching"
      dependencies:
        - "unit tests for patterns"
tasks:
  - id: "task-01-trader-agent-unit"
    title: "TraderAgent LLM-calling actions unit tests with FakePromptRunner"
    description: |
      Create TraderAgentLLMTest.java with 5-7 test methods covering the 5 report-generating actions that use streamWithTemplate. Each test uses FakeOperationContext.create(), sets context.expectResponse(), verifies prompt content, LLM role (CHEAPEST), and interaction IDs.
      
      Actions covered:
      - tickerFromUserInput (CHEAPEST, id=extractTicker)
      - generateFundamentalsReport (CHEAPEST, id=generateFundamentalsReport, withToolObject)
      - generateMarketReport (CHEAPEST, id=generateMarketReport)
      - generateNewsReport (CHEAPEST, id=generateNewsReport, withToolObject)
      - generateSocialMediaReport (CHEAPEST, id=generateSocialMediaReport, withToolObject)
      
      Test methods:
      1. tickerFromUserInput_callsLLMWithCheapestModel - verify CHEAPEST_ROLE, id=extractTicker, prompt contains user input
      2. tickerFromUserInput_parsesJSONResponse - verify parseTicker handles {content:AAPL}
      3. tickerFromUserInput_rejectsBlankInput - verify IllegalArgumentException
      4. generateFundamentalsReport_callsLLMWithTools - verify CHEAPEST_ROLE, id=generateFundamentalsReport, withToolObject present, prompt contains ticker
      5. generateMarketReport_callsLLM - verify CHEAPEST_ROLE, id=generateMarketReport, prompt contains ticker
      6. generateNewsReport_callsLLMWithNewsTools - verify CHEAPEST_ROLE, id=generateNewsReport, withToolObject present
      7. generateSocialMediaReport_callsLLM - verify CHEAPEST_ROLE, id=generateSocialMediaReport, withToolObject present
    wave: 1
    agent: "debugger"
    priority: "high"
    status: "pending"
    estimated_effort: "large"
    estimated_files: 1
    estimated_lines: 200
    focus_area: "unit-testing"
    verification:
      - "mvn test -Dtest=TraderAgentLLMTest"
      - "All 7 tests pass"
    acceptance_criteria:
      - "File: src/test/java/com/embabel/gekko/agent/TraderAgentLLMTest.java"
      - "5-7 test methods"
      - "Uses FakeOperationContext.create() and FakePromptRunner"
      - "Verifies LLM role, interaction IDs, prompt content"
      - "Tests tickerFromUserInput, generateFundamentalsReport, generateMarketReport, generateNewsReport, generateSocialMediaReport"
    success_criteria:
      - "test_results.failed === 0"
      - "All interaction IDs verified"
    failure_modes:
      - scenario: "streamWithTemplate private method is hard to test directly"
        likelihood: "high"
        impact: "medium"
        mitigation: "Test via public action methods; verify FakePromptRunner captured the call"
      - scenario: "ToolObject mocking is complex"
